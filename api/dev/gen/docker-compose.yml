version: '3.8'

services:
  lifeboxme_openapigen:
    container_name: lifeboxme_openapigen
    build: .
    image: lifeboxme_openapigen:latest
    restart: unless-stopped
    networks:
      lifeboxapinet:
        ipv4_address: 192.168.49.9
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-mikeintosh}
      - DB_NAME=${DB_NAME:-lifebox_mesystem}
      - FLASK_HOST=${FLASK_HOST:-0.0.0.0}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    volumes:
      - .:/app
#    depends_on:
#      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3



networks:
  lifeboxapinet:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.49.0/24

volumes:
  db_data: